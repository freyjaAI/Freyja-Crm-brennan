kind = "web"
  previewPath = "/"
  title = "Freyja IQ Broker CRM"
  version = "1.0.0"
  id = "artifacts/freyja-crm"
  router = "path"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  name = "web"
  paths = ["/"]
  localPort = 8080

  [services.env]
  PORT = "8080"
  NODE_ENV = "production"

  [services.development]
  run = "bash -c 'cd /home/runner/workspace/artifacts/freyja-crm && NODE_ENV=production node dist/index.cjs'"

  [services.production.build]
  args = ["pnpm", "--filter", "rest-express", "run", "build"]

  [services.production.build.env]
  NODE_ENV = "production"

  [services.production.run]
  args = ["node", "artifacts/freyja-crm/dist/index.cjs"]

  [services.production.run.env]
  PORT = "8080"
  NODE_ENV = "production"
  